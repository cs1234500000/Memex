<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memex · Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Courier+Prime:wght@0,400;0,700&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f2ed;--bg2:#ece8e1;--bg3:#e4dfd7;
  --surface:#faf9f7;--ink:#1c1a14;--ink2:#2e2b22;--muted:#7a7264;
  --border:#ddd8cf;--border2:#cdc8be;
  --amber:#c07820;--amber-lt:#e8a84a;--amber-bg:rgba(192,120,32,0.08);
  --forest:#2d5016;--rust:#a63d1f;--blue:#1a3a6b;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Courier Prime',monospace;
  --sans:'Jost',sans-serif;
  --r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--sans);font-weight:300;color:var(--ink);display:flex;flex-direction:column;}

.topbar{height:44px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:.75rem;}
.tb-logo{font-family:var(--serif);font-size:1.15rem;font-weight:700;color:var(--ink);letter-spacing:.02em;}
.tb-sep{width:1px;height:14px;background:var(--border2);}
.tb-ws{font-family:var(--mono);font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:.5rem;}
.tb-btn{font-family:var(--mono);font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:.26rem .65rem;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;border-radius:var(--r);transition:all .15s;}
.tb-btn:hover{border-color:var(--amber);color:var(--amber);}
.tb-btn.pri{background:var(--ink);border-color:var(--ink);color:var(--surface);}
.tb-btn.pri:hover{background:var(--amber);border-color:var(--amber);}

.shell{flex:1;display:flex;overflow:hidden;}

.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);}
.sb-sect{padding:.85rem .85rem .3rem;font-family:var(--mono);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.topic{display:flex;align-items:center;gap:.55rem;padding:.48rem .85rem;cursor:pointer;transition:background .12s;border-left:2px solid transparent;}
.topic:hover{background:var(--bg);}
.topic.active{background:var(--amber-bg);border-left-color:var(--amber);}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .15s;}
.topic.active .t-dot{background:var(--amber);}
.t-name{font-size:.72rem;color:var(--muted);flex:1;line-height:1.3;transition:color .12s;}
.topic.active .t-name,.topic:hover .t-name{color:var(--ink);}
.t-badge{font-family:var(--mono);font-size:.44rem;letter-spacing:.06em;background:var(--amber);color:white;padding:.08rem .3rem;border-radius:8px;}
.t-num{font-family:var(--mono);font-size:.48rem;color:var(--border2);}
.sb-div{height:1px;background:var(--border);margin:.5rem 0;}
.sb-foot{margin-top:auto;padding:.85rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.35rem;}
.sb-row{display:flex;justify-content:space-between;align-items:center;}
.sb-lbl{font-family:var(--mono);font-size:.47rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.sb-val{font-family:var(--serif);font-size:.85rem;font-weight:600;color:var(--ink2);}
.sb-val.hi{color:var(--amber);}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.graph-bar{height:42px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.1rem;gap:.75rem;}
.gb-bc{display:flex;align-items:center;gap:.45rem;}
.gb-crumb{font-family:var(--serif);font-size:.95rem;font-weight:600;color:var(--ink);}
.gb-crumb.dim{color:var(--muted);font-weight:400;cursor:pointer;}
.gb-crumb.dim:hover{color:var(--ink);}
.gb-sep{font-family:var(--mono);font-size:.7rem;color:var(--border2);}
.gb-sub{font-family:var(--mono);font-size:.52rem;letter-spacing:.07em;color:var(--muted);}
.gb-r{margin-left:auto;display:flex;align-items:center;gap:.5rem;}
.view-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.vt-btn{font-family:var(--mono);font-size:.5rem;letter-spacing:.09em;text-transform:uppercase;padding:.28rem .7rem;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;}
.vt-btn.on{background:var(--ink);color:var(--surface);}
.vt-btn:hover:not(.on){background:var(--bg);}

.graph-wrap{flex:1;display:flex;overflow:hidden;}
.graph-canvas{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#gsvg{width:100%;height:100%;}

.zoom-hint{
  position:absolute;bottom:1.1rem;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);background:var(--surface);border:1px solid var(--border);
  padding:.22rem .8rem;border-radius:20px;pointer-events:none;
  opacity:0;transition:opacity .3s;white-space:nowrap;
}
.zoom-hint.show{opacity:1;}

.threads-view{flex:1;display:none;flex-direction:column;}
.threads-view.on{display:flex;}
.tv-toolbar{height:38px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.1rem;gap:.6rem;background:var(--surface);}
.tv-filter{font-family:var(--mono);font-size:.5rem;letter-spacing:.09em;text-transform:uppercase;padding:.22rem .6rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:var(--r);transition:all .12s;}
.tv-filter.on,.tv-filter:hover{border-color:var(--amber);color:var(--amber);}
.tv-ct{margin-left:auto;font-family:var(--mono);font-size:.5rem;color:var(--muted);}
.threads-scroll{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));align-content:start;gap:1px;background:var(--border);}
.tc{background:var(--surface);padding:.9rem 1rem;cursor:pointer;transition:background .12s;}
.tc:hover{background:var(--bg2);}
.tc.dimmed{opacity:.4;}
.tc-top{display:flex;align-items:center;gap:.45rem;margin-bottom:.4rem;}
.tc-icon{font-size:.75rem;}
.tc-src{font-family:var(--mono);font-size:.48rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
.tc-date{margin-left:auto;font-family:var(--mono);font-size:.46rem;color:var(--border2);}
.tc-badge{font-family:var(--mono);font-size:.43rem;letter-spacing:.07em;text-transform:uppercase;padding:.07rem .28rem;border-radius:8px;}
.b-new{background:var(--amber);color:white;}
.b-added{background:var(--forest);color:white;}
.b-disc{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.b-read{border:1px solid var(--border);color:var(--muted);}
.tc-title{font-family:var(--serif);font-size:.88rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:.25rem;}
.tc-ex{font-family:var(--serif);font-size:.71rem;font-style:italic;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tc-topic{margin-top:.4rem;font-family:var(--mono);font-size:.44rem;letter-spacing:.07em;color:var(--amber);text-transform:uppercase;}
.tc-acts{display:flex;gap:.35rem;margin-top:.55rem;}
.ta{font-family:var(--mono);font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;padding:.24rem .55rem;border:1px solid;background:transparent;cursor:pointer;border-radius:var(--r);transition:all .12s;}
.ta-add{color:var(--forest);border-color:rgba(45,80,22,.4);}
.ta-add:hover{background:var(--forest);color:white;border-color:var(--forest);}
.ta-dis{color:var(--muted);border-color:var(--border);}
.ta-dis:hover{background:var(--bg3);color:var(--ink);}

.rp{width:0;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .26s cubic-bezier(.4,0,.2,1);}
.rp.open{width:310px;}
.rp-head{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-shrink:0;min-width:310px;}
.rp-ey{font-family:var(--mono);font-size:.5rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
.rp-title{font-family:var(--serif);font-size:.95rem;font-weight:700;color:var(--ink);}
.rp-x{margin-left:auto;font-family:var(--mono);font-size:.5rem;text-transform:uppercase;color:var(--muted);cursor:pointer;}
.rp-x:hover{color:var(--rust);}
.rp-back{font-family:var(--mono);font-size:.5rem;text-transform:uppercase;color:var(--muted);cursor:pointer;}
.rp-back:hover{color:var(--amber);}
.rp-scroll{flex:1;overflow-y:auto;min-width:310px;}
.rp-scroll::-webkit-scrollbar{width:3px;}
.rp-scroll::-webkit-scrollbar-thumb{background:var(--border2);}
.pthr{padding:.8rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.pthr:hover{background:var(--bg);}
.pthr.dimmed{opacity:.4;}
.pthr-top{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem;}
.pthr-src{font-family:var(--mono);font-size:.47rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.pthr-date{margin-left:auto;font-family:var(--mono);font-size:.44rem;color:var(--border2);}
.pthr-title{font-family:var(--serif);font-size:.85rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:.22rem;}
.pthr-ex{font-family:var(--serif);font-size:.69rem;font-style:italic;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pthr-acts{display:flex;gap:.35rem;margin-top:.5rem;}
.art{padding:1rem;}
.ad-ey{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;}
.ad-icon{font-size:.9rem;}
.ad-src{font-family:var(--mono);font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);}
.ad-date{margin-left:auto;font-family:var(--mono);font-size:.5rem;color:var(--muted);}
.ad-title{font-family:var(--serif);font-size:1.2rem;font-weight:700;line-height:1.2;margin-bottom:.9rem;color:var(--ink);}
.ad-acts{display:flex;gap:.4rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.adb{flex:1;font-family:var(--sans);font-size:.65rem;font-weight:400;padding:.45rem .4rem;border:1px solid;cursor:pointer;transition:all .15s;text-align:center;background:transparent;border-radius:var(--r);}
.adb-add{background:var(--forest);border-color:var(--forest);color:white;}
.adb-add:hover{background:#1e3a0e;}
.adb-dis{color:var(--muted);border-color:var(--border);}
.adb-dis:hover{background:var(--bg3);color:var(--ink);}
.adb-sav{color:var(--blue);border-color:rgba(26,58,107,.35);}
.adb-sav:hover{background:var(--blue);color:white;}
.added-bar{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.52rem;letter-spacing:.08em;color:var(--forest);}
.sec-lbl{font-family:var(--mono);font-size:.46rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;display:flex;align-items:center;gap:.45rem;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.ad-sum{font-family:var(--serif);font-size:.82rem;line-height:1.75;font-style:italic;color:var(--ink2);border-left:2px solid var(--amber);padding-left:.75rem;margin-bottom:1rem;}
.ins-row{display:flex;gap:.5rem;align-items:start;padding:.45rem 0;border-bottom:1px solid var(--border);}
.ins-row:last-child{border-bottom:none;}
.ins-arr{font-family:var(--mono);font-size:.6rem;color:var(--amber);flex-shrink:0;margin-top:.1rem;}
.ins-txt{font-size:.73rem;color:var(--muted);line-height:1.55;}
.conns{display:flex;flex-wrap:wrap;gap:.28rem;margin-bottom:1rem;}
.conn-chip{font-family:var(--mono);font-size:.47rem;color:var(--forest);border:1px solid rgba(45,80,22,.3);padding:.15rem .45rem;cursor:pointer;border-radius:var(--r);transition:background .12s;}
.conn-chip:hover{background:rgba(45,80,22,.07);}
.loom-note{background:var(--amber-bg);border:1px solid rgba(192,120,32,.2);padding:.7rem;margin-bottom:1rem;border-radius:var(--r);}
.ln-lbl{font-family:var(--mono);font-size:.45rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:.3rem;}
.ln-txt{font-family:var(--serif);font-size:.78rem;font-style:italic;color:var(--ink2);line-height:1.6;}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-logo">Memex</span>
  <div class="tb-sep"></div>
  <span class="tb-ws">Workspace</span>
  <div class="tb-r">
    <button class="tb-btn">⌘ Search</button>
    <button class="tb-btn pri">+ Ingest</button>
  </div>
</div>

<div class="shell">
  <div class="sidebar">
    <div class="sb-sect">Topics</div>
    <div class="topic active" data-topic="compounding" onclick="pickTopic(this)"><div class="t-dot"></div><span class="t-name">Compounding & Learning</span><span class="t-badge">3</span></div>
    <div class="topic" data-topic="ai-society" onclick="pickTopic(this)"><div class="t-dot"></div><span class="t-name">AI & Society</span><span class="t-badge">7</span></div>
    <div class="topic" data-topic="decision" onclick="pickTopic(this)"><div class="t-dot"></div><span class="t-name">Decision Making</span><span class="t-badge">1</span></div>
    <div class="topic" data-topic="leadership" onclick="pickTopic(this)"><div class="t-dot"></div><span class="t-name">Scaling & Leadership</span><span class="t-num">44</span></div>
    <div class="topic" data-topic="writing" onclick="pickTopic(this)"><div class="t-dot"></div><span class="t-name">Writing & Thinking</span><span class="t-badge">2</span></div>
    <div class="sb-div"></div>
    <div class="sb-sect">Recently Seeded</div>
    <div class="topic" data-topic="stoicism" onclick="pickTopic(this)"><div class="t-dot"></div><span class="t-name">Stoicism & Resilience</span><span class="t-num">12</span></div>
    <div class="topic" data-topic="behavioral" onclick="pickTopic(this)"><div class="t-dot"></div><span class="t-name">Behavioral Economics</span><span class="t-badge">4</span></div>
    <div class="sb-foot">
      <div class="sb-row"><span class="sb-lbl">Threads</span><span class="sb-val">380</span></div>
      <div class="sb-row"><span class="sb-lbl">Active since</span><span class="sb-val">Jan '25</span></div>
      <div class="sb-row"><span class="sb-lbl">Pending review</span><span class="sb-val hi">17</span></div>
    </div>
  </div>

  <div class="main">
    <div class="graph-bar">
      <div class="gb-bc" id="bc"></div>
      <span class="gb-sub" id="gb-sub"></span>
      <div class="gb-r">
        <div class="view-toggle">
          <button class="vt-btn on" id="btn-g" onclick="switchView('graph')">Graph</button>
          <button class="vt-btn" id="btn-t" onclick="switchView('threads')">Threads</button>
        </div>
      </div>
    </div>

    <div class="graph-wrap" id="graph-view">
      <div class="graph-canvas" id="graph-canvas">
        <div class="zoom-hint" id="hint">click empty space to zoom out</div>
        <svg id="gsvg" onclick="bgClick(event)"></svg>
      </div>
      <div class="rp" id="rp">
        <div id="pv-list" style="display:flex;flex-direction:column;height:100%;">
          <div class="rp-head">
            <div><div class="rp-ey" id="rp-ey"></div><div class="rp-title" id="rp-title"></div></div>
            <span class="rp-x" onclick="closeRp()">✕</span>
          </div>
          <div class="rp-scroll" id="rp-list"></div>
        </div>
        <div id="pv-art" style="display:none;flex-direction:column;height:100%;">
          <div class="rp-head">
            <span class="rp-back" onclick="backToList()">← back</span>
            <span class="rp-x" onclick="closeRp()" style="margin-left:auto;">✕</span>
          </div>
          <div class="rp-scroll"><div class="art" id="art-body"></div></div>
        </div>
      </div>
    </div>

    <div class="threads-view" id="threads-view">
      <div class="tv-toolbar">
        <button class="tv-filter on" onclick="filterT('all',this)">All</button>
        <button class="tv-filter" onclick="filterT('new',this)">New</button>
        <button class="tv-filter" onclick="filterT('added',this)">Added</button>
        <button class="tv-filter" onclick="filterT('unread',this)">Unread</button>
        <span class="tv-ct" id="tv-ct"></span>
      </div>
      <div class="threads-scroll" id="threads-scroll"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════ DATA ══════════════════════ */
const TOPICS = {
  compounding:{
    label:'Compounding & Learning', sub:'147 threads · 6 clusters',
    clusters:[
      {id:'sp', label:'Spaced\nRepetition',    cx:.50,cy:.30,r:.12, new:2,total:12},
      {id:'io', label:'Input vs\nOutput',       cx:.74,cy:.42,r:.085,new:0,total:8},
      {id:'kh', label:'Knowledge\nHalf-life',   cx:.68,cy:.68,r:.082,new:1,total:7},
      {id:'rs', label:'Reading\nSystems',       cx:.33,cy:.68,r:.09, new:0,total:14},
      {id:'ex', label:'Expertise\nFormation',   cx:.20,cy:.42,r:.10, new:0,total:11},
      {id:'rv', label:'Revisiting vs\nConsuming',cx:.50,cy:.61,r:.076,new:0,total:6},
    ],
    edges:[['sp','io'],['sp','ex'],['sp','rv'],['io','kh'],['kh','rv'],['rv','rs'],['rs','ex'],['ex','sp']],
    inner:{
      sp:{label:'Spaced Repetition',sub:'12 threads · 2 new',
        nodes:[
          {id:'sp_nr',label:'Neural\nRewiring',    cx:.36,cy:.30,r:.10,new:1,total:4},
          {id:'sp_alg',label:'SR\nAlgorithms',     cx:.65,cy:.28,r:.09,new:1,total:3},
          {id:'sp_ret',label:'Retrieval\nPractice',cx:.62,cy:.60,r:.085,new:0,total:3},
          {id:'sp_slp',label:'Sleep &\nConsolidation',cx:.28,cy:.62,r:.08,new:0,total:2},
        ],
        edges:[['sp_nr','sp_alg'],['sp_alg','sp_ret'],['sp_ret','sp_slp'],['sp_slp','sp_nr'],['sp_nr','sp_ret']]
      },
      kh:{label:'Knowledge Half-life',sub:'7 threads · 1 new',
        nodes:[
          {id:'kh_dc',label:'Decay\nCurves',    cx:.37,cy:.33,r:.095,new:1,total:3},
          {id:'kh_fl',label:'Field\nHalf-lives',cx:.65,cy:.35,r:.085,new:0,total:2},
          {id:'kh_rv',label:'Revision\nStrategy',cx:.55,cy:.63,r:.09,new:0,total:2},
        ],
        edges:[['kh_dc','kh_fl'],['kh_fl','kh_rv'],['kh_rv','kh_dc']]
      }
    }
  },
  'ai-society':{
    label:'AI & Society',sub:'89 threads · 5 clusters',
    clusters:[
      {id:'al',label:'AI\nAlignment',         cx:.50,cy:.26,r:.12,new:3,total:18},
      {id:'lb',label:'Labor &\nAutomation',   cx:.75,cy:.44,r:.09,new:2,total:15},
      {id:'gv',label:'AI\nGovernance',        cx:.64,cy:.68,r:.085,new:1,total:9},
      {id:'cr',label:'Creativity\n& AI',      cx:.32,cy:.66,r:.09,new:1,total:12},
      {id:'tr',label:'Trust &\nTransparency', cx:.21,cy:.42,r:.085,new:0,total:10},
    ],
    edges:[['al','lb'],['al','tr'],['lb','gv'],['gv','cr'],['cr','tr'],['al','gv']],
    inner:{
      al:{label:'AI Alignment',sub:'18 threads · 3 new',
        nodes:[
          {id:'al_rla',label:'RLHF &\nConstitutional',cx:.38,cy:.30,r:.10,new:2,total:7},
          {id:'al_int',label:'Interpretability',      cx:.64,cy:.28,r:.09,new:1,total:5},
          {id:'al_scn',label:'Failure\nScenarios',    cx:.65,cy:.62,r:.09,new:0,total:4},
          {id:'al_val',label:'Value\nAlignment',      cx:.32,cy:.62,r:.09,new:0,total:2},
        ],
        edges:[['al_rla','al_int'],['al_int','al_scn'],['al_scn','al_val'],['al_val','al_rla']]
      }
    }
  },
  decision:{
    label:'Decision Making',sub:'62 threads · 4 clusters',
    clusters:[
      {id:'mm',label:'Mental\nModels',        cx:.50,cy:.28,r:.11,new:1,total:16},
      {id:'cb',label:'Cognitive\nBias',       cx:.72,cy:.48,r:.09,new:0,total:14},
      {id:'ur',label:'Uncertainty\n& Risk',   cx:.57,cy:.67,r:.09,new:0,total:12},
      {id:'df',label:'Decision\nFrameworks',  cx:.28,cy:.55,r:.09,new:0,total:13},
    ],
    edges:[['mm','cb'],['mm','df'],['cb','ur'],['ur','df'],['df','mm']],
    inner:{}
  }

/* ══════════════════════ STATE ══════════════════════ */
let activeTopic='compounding', zoomedId=null, currentView='graph', filterState='all';
let vbFrom={x:0,y:0,w:0,h:0}, vbTo={x:0,y:0,w:0,h:0}, vbNow={x:0,y:0,w:0,h:0};
let rafId=null;

/* ══════════════════════ BOOT ══════════════════════ */
window.addEventListener('load',()=>{ pickTopic(document.querySelector('.topic.active')); });
window.addEventListener('resize',()=>{ if(currentView==='graph'){buildGraph();} });

/* ══════════════════════ TOPIC ══════════════════════ */
function pickTopic(el){
  document.querySelectorAll('.topic').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  activeTopic=el.dataset.topic; zoomedId=null;
  closeRp(false); setBc(); if(currentView==='graph') buildGraph(); else renderTV();
}

/* ══════════════════════ VIEW ══════════════════════ */
function switchView(v){
  currentView=v;
  document.getElementById('btn-g').classList.toggle('on',v==='graph');
  document.getElementById('btn-t').classList.toggle('on',v==='threads');
  document.getElementById('graph-view').style.display  =v==='graph'  ?'flex':'none';
  document.getElementById('threads-view').style.display=v==='threads'?'flex':'none';
  if(v==='threads'){renderTV();closeRp(false);}else buildGraph();
}

/* ══════════════════════ BREADCRUMB ══════════════════════ */
function setBc(){
  const T=TOPICS[activeTopic];
  const bc=document.getElementById('bc'), sub=document.getElementById('gb-sub');
  if(!T){bc.innerHTML='<span class="gb-crumb">—</span>';sub.textContent='';return;}
  if(!zoomedId){
    bc.innerHTML=`<span class="gb-crumb">${T.label}</span>`;
    sub.textContent=T.sub;
  } else {
    const inn=T.inner&&T.inner[zoomedId];
    bc.innerHTML=`<span class="gb-crumb dim" onclick="zoomOut()">${T.label}</span><span class="gb-sep">›</span><span class="gb-crumb">${inn?inn.label:zoomedId}</span>`;
    sub.textContent=inn?inn.sub:'';
  }
}

/* ══════════════════════ GRAPH ══════════════════════ */
const NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs){const e=document.createElementNS(NS,tag);Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));return e;}

function buildGraph(){
  const T=TOPICS[activeTopic];
  const svg=document.getElementById('gsvg');
  const W=svg.clientWidth||700, H=svg.clientHeight||520;
  svg.innerHTML='';
  svg.dataset.w=W; svg.dataset.h=H;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  vbNow=vbFrom=vbTo={x:0,y:0,w:W,h:H};
  if(!T) return;

  // outer edges
  const edgesG=svgEl('g',{class:'outer-edges'});
  T.edges.forEach(([a,b])=>{
    const ca=T.clusters.find(c=>c.id===a), cb=T.clusters.find(c=>c.id===b);
    if(!ca||!cb) return;
    edgesG.appendChild(svgEl('line',{x1:ca.cx*W,y1:ca.cy*H,x2:cb.cx*W,y2:cb.cy*H,stroke:'rgba(192,120,32,0.18)','stroke-width':'1','stroke-dasharray':'5 4'}));
  });
  svg.appendChild(edgesG);

  // outer clusters (each with embedded inner nodes)
  T.clusters.forEach(cl=>{
    const cx=cl.cx*W, cy=cl.cy*H, r=Math.min(W,H)*cl.r;
    const hasNew=cl.new>0;
    const hasInner=T.inner&&T.inner[cl.id]&&T.inner[cl.id].nodes.length;
    const fillN=hasNew?'rgba(192,120,32,0.09)':'rgba(28,26,20,0.04)';
    const strkN=hasNew?'rgba(192,120,32,0.45)':'rgba(180,172,158,0.38)';

    // outer pulse ring
    if(hasNew){
      svg.appendChild(svgEl('circle',{cx,cy,r:r+12,fill:'none',stroke:'rgba(192,120,32,0.11)','stroke-width':'1.5','stroke-dasharray':'3 5',class:'oring'}));
    }

    const g=svgEl('g'); g.dataset.cid=cl.id;
    g.style.cursor=hasInner?'zoom-in':'pointer';

    // main circle
    const circ=svgEl('circle',{cx,cy,r,fill:fillN,stroke:strkN,'stroke-width':'1.5',class:'ocirc'});
    circ.style.transition='fill .18s,stroke .18s';
    g.appendChild(circ);

    // inner nodes embedded inside
    if(hasInner){
      const inn=T.inner[cl.id];
      // inner edges
      inn.edges.forEach(([a,b])=>{
        const na=inn.nodes.find(n=>n.id===a), nb=inn.nodes.find(n=>n.id===b);
        if(!na||!nb) return;
        const pa=ipos(na,cx,cy,r*.72), pb=ipos(nb,cx,cy,r*.72);
        const le=svgEl('line',{x1:pa.x,y1:pa.y,x2:pb.x,y2:pb.y,stroke:'rgba(192,120,32,0.25)','stroke-width':'0.8','stroke-dasharray':'3 3'});
        le.style.opacity='0'; le.style.transition='opacity .25s';
        le.dataset.parent=cl.id; le.classList.add('inner-e');
        g.appendChild(le);
      });
      // inner nodes
      inn.nodes.forEach(nd=>{
        const pos=ipos(nd,cx,cy,r*.72);
        const ir=Math.min(W,H)*nd.r*.55;
        const iN=nd.new>0;
        const ifN=iN?'rgba(192,120,32,0.11)':'rgba(28,26,20,0.05)';
        const isN=iN?'rgba(192,120,32,0.55)':'rgba(180,172,158,0.42)';

        const ng=svgEl('g'); ng.dataset.parent=cl.id; ng.dataset.nid=nd.id;
        ng.classList.add('inner-n'); ng.style.opacity='0'; ng.style.pointerEvents='none';
        ng.style.transition='opacity .25s'; ng.style.cursor='pointer';

        const inc=svgEl('circle',{cx:pos.x,cy:pos.y,r:ir,fill:ifN,stroke:isN,'stroke-width':'1'});
        inc.style.transition='fill .15s,stroke .15s';
        ng.appendChild(inc);

        // label
        nd.label.split('\n').forEach((ln,i,arr)=>{
          const lh=11;
          const t=svgEl('text',{x:pos.x,y:pos.y-(arr.length-1)*lh/2+i*lh,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Cormorant Garamond,Georgia,serif','font-size':Math.max(9,ir*.32),'font-weight':'600',fill:iN?'rgba(100,65,8,0.9)':'rgba(28,26,20,0.5)'});
          t.textContent=ln; t.style.pointerEvents='none'; ng.appendChild(t);
        });
        if(iN){
          const bx=pos.x+ir*.7,by=pos.y-ir*.7;
          const bc=svgEl('circle',{cx:bx,cy:by,r:7,fill:'#c07820'}); bc.style.pointerEvents='none'; ng.appendChild(bc);
          const bt=svgEl('text',{x:bx,y:by+.5,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Jost,sans-serif','font-size':'7','font-weight':'500',fill:'white'});
          bt.textContent=nd.new; bt.style.pointerEvents='none'; ng.appendChild(bt);
        }

        ng.addEventListener('mouseenter',()=>{inc.setAttribute('fill','rgba(192,120,32,0.2)');inc.setAttribute('stroke','rgba(192,120,32,0.85)');});
        ng.addEventListener('mouseleave',()=>{inc.setAttribute('fill',ifN);inc.setAttribute('stroke',isN);});
        ng.addEventListener('click',e=>{e.stopPropagation();openRpFor(nd.id, nd.label.replace('\n',' '), nd);});
        g.appendChild(ng);
      });
    }

    // outer label (hidden when zoomed in on this cluster)
    const olg=svgEl('g',{class:'outer-lbl'}); olg.dataset.cid=cl.id; olg.style.pointerEvents='none';
    const lh2=15;
    cl.label.split('\n').forEach((ln,i,arr)=>{
      const t=svgEl('text',{x:cx,y:cy-(arr.length-1)*lh2/2+i*lh2,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Cormorant Garamond,Georgia,serif','font-size':Math.max(11,r*.26),'font-weight':'600',fill:hasNew?'rgba(100,65,8,0.88)':'rgba(28,26,20,0.45)'});
      t.textContent=ln; olg.appendChild(t);
    });
    // thread count
    const cnt=svgEl('text',{x:cx,y:cy+r-13,'text-anchor':'middle','font-family':'Courier Prime,monospace','font-size':Math.max(8,r*.17),fill:'rgba(28,26,20,0.2)'});
    cnt.textContent=`${cl.total} threads`; olg.appendChild(cnt);
    if(hasInner){
      const zi=svgEl('text',{x:cx,y:cy+r-3,'text-anchor':'middle','font-family':'Courier Prime,monospace','font-size':'9',fill:'rgba(192,120,32,0.4)'});
      zi.textContent='↓ zoom in'; olg.appendChild(zi);
    }
    g.appendChild(olg);

    // new badge
    if(hasNew){
      const bx=cx+r*.68, by=cy-r*.68;
      const bc=svgEl('circle',{cx:bx,cy:by,r:11,fill:'#c07820'}); bc.style.pointerEvents='none'; g.appendChild(bc);
      const bt=svgEl('text',{x:bx,y:by+.5,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Jost,sans-serif','font-size':'9','font-weight':'500',fill:'white'});
      bt.textContent=cl.new; bt.style.pointerEvents='none'; g.appendChild(bt);
    }

    g.addEventListener('mouseenter',()=>{ if(zoomedId!==cl.id){circ.setAttribute('fill',hasNew?'rgba(192,120,32,0.17)':'rgba(28,26,20,0.08)');circ.setAttribute('stroke','rgba(192,120,32,0.7)');} });
    g.addEventListener('mouseleave',()=>{ if(zoomedId!==cl.id){circ.setAttribute('fill',fillN);circ.setAttribute('stroke',strkN);} });
    g.addEventListener('click',e=>{e.stopPropagation(); clkCluster(cl,cx,cy,r,W,H);});
    svg.appendChild(g);
  });

  // restore zoom state if we rebuilt while zoomed
  if(zoomedId){
    const cl=T.clusters.find(c=>c.id===zoomedId);
    if(cl){ const cx=cl.cx*W,cy=cl.cy*H,r=Math.min(W,H)*cl.r; doZoom(zoomedId,cx,cy,r,true); }
  }
}

function ipos(nd,pcx,pcy,pr){
  return {x:pcx+(nd.cx-.5)*2*pr, y:pcy+(nd.cy-.5)*2*pr};
}

/* ══════════════════════ CLICK & ZOOM ══════════════════════ */
function clkCluster(cl,cx,cy,r,W,H){
  const T=TOPICS[activeTopic];
  const hasInner=T.inner&&T.inner[cl.id]&&T.inner[cl.id].nodes.length;
  if(!zoomedId){
    if(hasInner){ zoomedId=cl.id; setBc(); doZoom(cl.id,cx,cy,r,false); closeRp(false); }
    else openRpFor(cl.id, cl.label.replace('\n',' '), cl);
  } else if(zoomedId===cl.id){
    openRpFor(cl.id, cl.label.replace('\n',' '), cl);
  }
}

function doZoom(cid,cx,cy,r,instant){
  const svg=document.getElementById('gsvg');
  const W=+svg.dataset.w, H=+svg.dataset.h;
  const pad=r*.4;
  vbTo={x:cx-r-pad, y:cy-r-pad, w:(r+pad)*2, h:(r+pad)*2};

  // fade other clusters
  document.querySelectorAll('[data-cid]').forEach(g=>{
    const self=g.dataset.cid===cid;
    g.style.transition='opacity .3s';
    g.style.opacity=self?'1':'0.1';
  });
  document.querySelectorAll('.oring').forEach(e=>{e.style.transition='opacity .3s';e.style.opacity='0';});
  document.querySelector('.outer-edges').style.transition='opacity .3s';
  document.querySelector('.outer-edges').style.opacity='0';
  // hide outer labels of the zoomed cluster
  document.querySelectorAll('.outer-lbl').forEach(g=>{ g.style.transition='opacity .2s'; g.style.opacity=g.dataset.cid===cid?'0':'1'; });
  // show inner nodes
  document.querySelectorAll('.inner-n,.inner-e').forEach(e=>{
    const vis=e.dataset.parent===cid;
    e.style.opacity=vis?'1':'0';
    if(e.classList.contains('inner-n')) e.style.pointerEvents=vis?'all':'none';
  });
  document.getElementById('hint').classList.add('show');
  if(instant){ svg.setAttribute('viewBox',`${vbTo.x} ${vbTo.y} ${vbTo.w} ${vbTo.h}`); vbNow={...vbTo}; }
  else { vbFrom={...vbNow}; animVb(); }
}

function zoomOut(){
  if(!zoomedId) return;
  const old=zoomedId; zoomedId=null; setBc(); closeRp(false);
  const svg=document.getElementById('gsvg');
  const W=+svg.dataset.w, H=+svg.dataset.h;
  vbFrom={...vbNow}; vbTo={x:0,y:0,w:W,h:H}; animVb();
  document.querySelectorAll('[data-cid]').forEach(g=>{g.style.transition='opacity .3s';g.style.opacity='1';});
  document.querySelectorAll('.oring').forEach(e=>{e.style.transition='opacity .3s';e.style.opacity='1';});
  document.querySelector('.outer-edges').style.transition='opacity .3s';
  document.querySelector('.outer-edges').style.opacity='1';
  document.querySelectorAll('.outer-lbl').forEach(g=>{g.style.transition='opacity .2s';g.style.opacity='1';});
  document.querySelectorAll('.inner-n,.inner-e').forEach(e=>{e.style.opacity='0'; if(e.classList.contains('inner-n')) e.style.pointerEvents='none';});
  document.getElementById('hint').classList.remove('show');
}

function bgClick(e){
  if(e.target.id==='gsvg'||e.target.tagName==='line'){ if(zoomedId) zoomOut(); else closeRp(); }
}

/* viewBox animation */
function animVb(){
  if(rafId) cancelAnimationFrame(rafId);
  const svg=document.getElementById('gsvg');
  const t0=performance.now(), dur=480;
  const from={...vbFrom}, to={...vbTo};
  function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
  function step(now){
    let p=Math.min(1,(now-t0)/dur); p=ease(p);
    vbNow={x:from.x+(to.x-from.x)*p, y:from.y+(to.y-from.y)*p, w:from.w+(to.w-from.w)*p, h:from.h+(to.h-from.h)*p};
    svg.setAttribute('viewBox',`${vbNow.x} ${vbNow.y} ${vbNow.w} ${vbNow.h}`);
    if(p<1) rafId=requestAnimationFrame(step); else vbNow={...to};
  }
  rafId=requestAnimationFrame(step);
}

/* ══════════════════════ RIGHT PANEL ══════════════════════ */
function openRpFor(id, label, node){
  // id can be cluster or sub-cluster — match threads
  const items=THREADS.filter(t=>t.cluster===id||t.subcluster===id);
  const total=node.total||items.length;
  const newCt=node.new||0;
  document.getElementById('rp-ey').textContent=label;
  document.getElementById('rp-title').textContent=`${total} threads · ${newCt} new`;
  const list=document.getElementById('rp-list');
  list.innerHTML='';
  if(!items.length){
    list.innerHTML='<div style="padding:1.5rem 1rem;font-family:var(--serif);font-size:.85rem;font-style:italic;color:var(--muted);">No threads ingested yet.</div>';
  } else {
    items.forEach(th=>{
      const d=document.createElement('div');
      d.className='pthr'+(th.status==='discarded'?' dimmed':'');
      d.innerHTML=`<div class="pthr-top"><span class="tc-icon">${th.icon}</span><span class="pthr-src">${th.src}</span><span class="pthr-date">${th.date}</span>${bdg(th.status)}</div><div class="pthr-title">${th.title}</div><div class="pthr-ex">${th.excerpt}</div>${th.status==='new'?`<div class="pthr-acts"><button class="ta ta-add" onclick="event.stopPropagation();qAdd(this)">+ Add</button><button class="ta ta-dis" onclick="event.stopPropagation();qDis(this)">Discard</button></div>`:''}`;
      d.addEventListener('click',()=>openArt(th));
      list.appendChild(d);
    });
  }
  document.getElementById('pv-list').style.display='flex';
  document.getElementById('pv-art').style.display='none';
  document.getElementById('rp').classList.add('open');
}

function closeRp(){document.getElementById('rp').classList.remove('open');}

function openArt(th){
  const isNew=th.status==='new', isAdded=th.status==='added';
  document.getElementById('art-body').innerHTML=`<div class="ad-ey"><span class="ad-icon">${th.icon}</span><span class="ad-src">${th.src}</span><span class="ad-date">${th.date}</span></div><div class="ad-title">${th.title}</div>${isNew?`<div class="ad-acts" id="adacts"><button class="adb adb-add" onclick="addD()">+ Add to Base</button><button class="adb adb-dis" onclick="disD()">Discard</button><button class="adb adb-sav">Save</button></div>`:isAdded?`<div class="added-bar">✓ In your knowledge base</div>`:''}${th.loom?`<div class="loom-note"><div class="ln-lbl">🧵 Memex connection</div><div class="ln-txt">${th.loom}</div></div>`:''}${th.summary?`<div class="sec-lbl">AI summary</div><div class="ad-sum">${th.summary}</div>`:''}${th.insights&&th.insights.length?`<div class="sec-lbl">Key insights</div><div style="margin-bottom:1rem;">${th.insights.map(i=>`<div class="ins-row"><span class="ins-arr">→</span><span class="ins-txt">${i}</span></div>`).join('')}</div>`:''}${th.connected&&th.connected.length?`<div class="sec-lbl">Connected threads</div><div class="conns">${th.connected.map(c=>`<span class="conn-chip">🧵 ${c}</span>`).join('')}</div>`:''}`;
  document.getElementById('pv-list').style.display='none';
  document.getElementById('pv-art').style.display='flex';
}
function backToList(){document.getElementById('pv-art').style.display='none';document.getElementById('pv-list').style.display='flex';}
function addD(){const e=document.getElementById('adacts');if(e)e.outerHTML='<div class="added-bar">✓ Added to knowledge base</div>';}
function disD(){const e=document.getElementById('adacts');if(e)e.outerHTML='<div class="added-bar" style="color:var(--muted);">Discarded</div>';}
function qAdd(btn){btn.textContent='✓ Added';btn.style.cssText='background:var(--forest);color:white;border-color:var(--forest);border-radius:4px;';const s=btn.nextElementSibling;if(s)s.style.display='none';const b=btn.closest('.pthr').querySelector('.tc-badge');if(b){b.className='tc-badge b-added';b.textContent='Added';}}
function qDis(btn){const p=btn.closest('.pthr');p.classList.add('dimmed');p.querySelector('.pthr-acts').style.display='none';const b=p.querySelector('.tc-badge');if(b){b.className='tc-badge b-disc';b.textContent='Discarded';}}
function bdg(s){const m={new:'b-new New',added:'b-added Added',discarded:'b-disc Discarded',read:'b-read Read'};const[c,l]=(m[s]||'b-read Read').split(' ');return `<span class="tc-badge ${c}">${l}</span>`;}

/* ══════════════════════ THREADS VIEW ══════════════════════ */
function renderTV(){
  const items=THREADS.filter(t=>{
    if(t.topic!==activeTopic)return false;
    if(filterState==='new')return t.status==='new';
    if(filterState==='added')return t.status==='added';
    if(filterState==='unread')return t.status==='new'||t.status==='read';
    return true;
  });
  document.getElementById('tv-ct').textContent=`${items.length} thread${items.length!==1?'s':''}`;
  const sc=document.getElementById('threads-scroll'); sc.innerHTML='';
  items.forEach(th=>{
    const d=document.createElement('div');
    d.className='tc'+(th.status==='discarded'?' dimmed':'');
    d.innerHTML=`<div class="tc-top"><span class="tc-icon">${th.icon}</span><span class="tc-src">${th.src}</span><span class="tc-date">${th.date}</span>${bdg(th.status)}</div><div class="tc-title">${th.title}</div><div class="tc-ex">${th.excerpt}</div><div class="tc-topic">${th.clusterLabel}</div>${th.status==='new'?`<div class="tc-acts"><button class="ta ta-add" onclick="event.stopPropagation();qAddC(this)">+ Add</button><button class="ta ta-dis" onclick="event.stopPropagation();qDisC(this)">Discard</button></div>`:''}`;
    d.addEventListener('click',()=>{switchView('graph');setTimeout(()=>openArt(th),80);});
    sc.appendChild(d);
  });
}
function filterT(f,btn){filterState=f;document.querySelectorAll('.tv-filter').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderTV();}
function qAddC(btn){btn.textContent='✓ Added';btn.style.cssText='background:var(--forest);color:white;border-color:var(--forest);border-radius:4px;';const s=btn.nextElementSibling;if(s)s.style.display='none';const b=btn.closest('.tc').querySelector('.tc-badge');if(b){b.className='tc-badge b-added';b.textContent='Added';}}
function qDisC(btn){const p=btn.closest('.tc');p.classList.add('dimmed');p.querySelector('.tc-acts').style.display='none';const b=p.querySelector('.tc-badge');if(b){b.className='tc-badge b-disc';b.textContent='Discarded';}}
</script>
