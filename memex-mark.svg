<svg width="400" height="400" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow1" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="edgeV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7a35" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff7a35" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="edgeD1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a35" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff7a35" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="edgeD2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7a35" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff7a35" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="midFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a5c"/>
      <stop offset="100%" stop-color="#c44a10"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="160" height="160" fill="#080a0e"/>

  <!-- Ghost cross-edges -->
  <line x1="28" y1="128" x2="132" y2="32"  stroke="#ff7a35" stroke-width="0.5" stroke-opacity="0.07" stroke-dasharray="3,5"/>
  <line x1="28" y1="32"  x2="132" y2="128" stroke="#ff7a35" stroke-width="0.5" stroke-opacity="0.06" stroke-dasharray="3,5"/>
  <line x1="28" y1="32"  x2="132" y2="32"  stroke="#ff7a35" stroke-width="0.5" stroke-opacity="0.06" stroke-dasharray="3,5"/>
  <line x1="28" y1="128" x2="132" y2="128" stroke="#ff7a35" stroke-width="0.5" stroke-opacity="0.05" stroke-dasharray="3,5"/>

  <!-- M edges -->
  <line x1="28"  y1="128" x2="28"  y2="32"  stroke="url(#edgeV)"  stroke-width="1.6" stroke-linecap="round"/>
  <line x1="28"  y1="32"  x2="80"  y2="86"  stroke="url(#edgeD1)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="80"  y1="86"  x2="132" y2="32"  stroke="url(#edgeD2)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="132" y1="32"  x2="132" y2="128" stroke="url(#edgeV)"  stroke-width="1.6" stroke-linecap="round"/>

  <!-- Corner nodes -->
  <circle cx="28"  cy="128" r="6.5" fill="#080a0e" stroke="#ff7a35" stroke-width="1.2" opacity="0.75"/>
  <circle cx="28"  cy="128" r="2.8" fill="#ff7a35" opacity="0.65" filter="url(#glow1)"/>

  <circle cx="28"  cy="32"  r="6.5" fill="#080a0e" stroke="#ff7a35" stroke-width="1.2"/>
  <circle cx="28"  cy="32"  r="2.8" fill="#ff7a35" filter="url(#glow1)"/>

  <circle cx="132" cy="32"  r="6.5" fill="#080a0e" stroke="#ff7a35" stroke-width="1.2"/>
  <circle cx="132" cy="32"  r="2.8" fill="#ff7a35" filter="url(#glow1)"/>

  <circle cx="132" cy="128" r="6.5" fill="#080a0e" stroke="#ff7a35" stroke-width="1.2" opacity="0.75"/>
  <circle cx="132" cy="128" r="2.8" fill="#ff7a35" opacity="0.65" filter="url(#glow1)"/>

  <!-- Center node — the dip of M -->
  <circle cx="80" cy="86" r="22" fill="#ff7a35" opacity="0.04" filter="url(#glow3)"/>
  <circle cx="80" cy="86" r="15" fill="none" stroke="#ff7a35" stroke-width="0.7" opacity="0.18">
    <animate attributeName="r" values="13;20;13" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0;0.18" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="86" r="11" fill="#080a0e" stroke="#ff7a35" stroke-width="1.5"/>
  <circle cx="80" cy="86" r="7"  fill="url(#midFill)" filter="url(#glow2)"/>
  <circle cx="80" cy="86" r="3"  fill="white" opacity="0.88"/>

  <!-- Animated pulses -->
  <circle r="2" fill="#ff9a5c" filter="url(#glow1)">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0s" path="M28,32 L80,86"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#ff9a5c" filter="url(#glow1)">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.1s" path="M132,32 L80,86"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="1.1s"/>
  </circle>
  <circle r="1.6" fill="#ff7a35" filter="url(#glow1)">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.6s" path="M28,32 L28,128"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle r="1.6" fill="#ff7a35" filter="url(#glow1)">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="1.7s" path="M132,32 L132,128"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2.6s" repeatCount="indefinite" begin="1.7s"/>
  </circle>
</svg>
